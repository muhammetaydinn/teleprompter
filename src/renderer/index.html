<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <section id="readPanel" class="panel read-panel">
        <div class="read-wrap" id="readWrap">
          <div
            class="read-text"
            id="readText"
            data-i18n-attr="data-placeholder:read.placeholder"
          ></div>
        </div>

        <div class="controls">
          <button id="playPauseBtn" class="ctrl-btn"></button>
          <button
            id="resetBtn"
            class="ctrl-btn"
            data-i18n="controls.reset"
          ></button>

          <button id="toggleEditorBtn" class="ctrl-btn"></button>
        </div>

        <div class="settings-grid controls-settings toggleable-control">
          <label class="step-row">
            <span data-i18n="settings.font"></span>
            <button
              id="fontDown"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.font.decrease"
            >
              −
            </button>
            <input
              id="fontValueInput"
              class="step-input"
              type="number"
              min="16"
              max="120"
              step="1"
              value="40"
            />
            <button
              id="fontUp"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.font.increase"
            >
              +
            </button>
          </label>

          <label class="step-row">
            <span data-i18n="settings.opacity"></span>
            <button
              id="opacityDown"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.opacity.decrease"
            >
              −
            </button>
            <input
              id="opacityValueInput"
              class="step-input"
              type="number"
              min="0"
              max="100"
              step="1"
              value="85"
            />
            <button
              id="opacityUp"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.opacity.increase"
            >
              +
            </button>
          </label>

          <label class="speed-row">
            <span data-i18n="settings.speed"></span>
            <button
              id="speedDown"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.speed.decrease"
            >
              −
            </button>
            <input
              id="speedValueInput"
              class="step-input"
              type="number"
              min="0.1"
              max="20"
              step="0.1"
              value="3"
            />
            <button
              id="speedUp"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.speed.increase"
            >
              +
            </button>
          </label>

          <label>
            <span data-i18n="settings.textColor"></span>
            <input id="textColor" type="color" value="#ffffff" />
          </label>

          <label>
            <span data-i18n="settings.background"></span>
            <input id="bgColor" type="color" value="#000000" />
          </label>

          <label class="toggle-row">
            <span data-i18n="settings.alwaysOnTop"></span>
            <input id="alwaysOnTop" type="checkbox" />
          </label>
        </div>
      </section>
    </div>

    <script src="./i18n/en.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
