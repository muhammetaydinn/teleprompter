<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <section id="editPanel" class="panel edit-panel">
        <div class="settings-grid">
          <label>
            <span data-i18n="settings.font"></span>
            <strong id="fontValue"></strong>
            <input id="fontSize" type="range" min="16" max="120" value="40" />
          </label>

          <label>
            <span data-i18n="settings.opacity"></span>
            <strong id="opacityValue"></strong>
            <input id="opacity" type="range" min="0" max="100" value="85" />
          </label>

          <label class="speed-row">
            <span data-i18n="settings.speed"></span>
            <button
              id="speedDown"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.speed.decrease"
            >
              −
            </button>
            <strong id="speedValue"></strong>
            <button
              id="speedUp"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.speed.increase"
            >
              +
            </button>
            <input
              id="speed"
              type="range"
              min="0.1"
              max="20"
              step="0.1"
              value="3"
            />
          </label>

          <label>
            <span data-i18n="settings.textColor"></span>
            <input id="textColor" type="color" value="#ffffff" />
          </label>

          <label>
            <span data-i18n="settings.background"></span>
            <input id="bgColor" type="color" value="#000000" />
          </label>

          <label class="toggle-row">
            <span data-i18n="settings.alwaysOnTop"></span>
            <input id="alwaysOnTop" type="checkbox" />
          </label>
        </div>

        <textarea
          id="textInput"
          class="text-input"
          data-i18n-attr="placeholder:editor.placeholder"
        ></textarea>

        <div class="actions">
          <button
            id="startBtn"
            class="primary-btn"
            data-i18n="actions.start"
          ></button>
        </div>
      </section>

      <section id="readPanel" class="panel read-panel hidden">
        <div class="read-wrap" id="readWrap">
          <div
            class="read-text"
            id="readText"
            contenteditable="true"
            spellcheck="false"
            data-i18n-attr="data-placeholder:read.placeholder"
          ></div>
        </div>

        <div class="controls">
          <button id="playPauseBtn" class="ctrl-btn"></button>
          <button
            id="resetBtn"
            class="ctrl-btn"
            data-i18n="controls.reset"
          ></button>

          <label class="speed-inline">
            <button
              id="speedReadDown"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.speed.decrease"
            >
              −
            </button>
            <span data-i18n="controls.speed"></span>
            <input
              id="speedRead"
              type="range"
              min="0.1"
              max="20"
              step="0.1"
              value="3"
            />
            <button
              id="speedReadUp"
              class="speed-step-btn"
              type="button"
              data-i18n-attr="aria-label:aria.speed.increase"
            >
              +
            </button>
            <strong id="speedReadValue"></strong>
          </label>

          <label class="setting-inline">
            <span data-i18n="settings.font"></span>
            <input
              id="fontSizeRead"
              type="range"
              min="16"
              max="120"
              value="40"
            />
            <strong id="fontReadValue"></strong>
          </label>

          <label class="setting-inline">
            <span data-i18n="settings.opacity"></span>
            <input id="opacityRead" type="range" min="0" max="100" value="85" />
            <strong id="opacityReadValue"></strong>
          </label>

          <label class="color-inline">
            <span data-i18n="settings.textColor"></span>
            <input id="textColorRead" type="color" value="#ffffff" />
          </label>

          <label class="color-inline">
            <span data-i18n="settings.background"></span>
            <input id="bgColorRead" type="color" value="#000000" />
          </label>

          <label class="toggle-inline">
            <span data-i18n="controls.onTop"></span>
            <input id="alwaysOnTopRead" type="checkbox" />
          </label>

          <button
            id="editBtn"
            class="ctrl-btn"
            data-i18n="actions.edit"
          ></button>
        </div>
      </section>
    </div>

    <script src="./i18n/en.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
